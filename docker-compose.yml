services:
  plex:
    image: linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID:-501}
      - PGID=${PGID:-20}
      - TZ=${TZ:-America/New_York}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    volumes:
      - ./config/plex:/config
      - ./data/media:/data/media
    labels:
      dashboard.enabled: "true"
      dashboard.name: "Plex"
      dashboard.port: "32400"
      dashboard.path: "/web"
      dashboard.color: "#e5a00d"
      dashboard.external: "true"
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=${PUID:-501}
      - PGID=${PGID:-20}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/transmission:/config
      - ./data/torrents:/data/torrents
      - ./data/torrents/watch:/watch
    labels:
      dashboard.enabled: "true"
      dashboard.name: "Transmission"
      dashboard.port: "9091"
      dashboard.color: "#b71c1c"
    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-501}
      - PGID=${PGID:-20}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/prowlarr:/config
      - ./data/torrents:/data/torrents
    ports:
      - "9696:9696"
    labels:
      dashboard.enabled: "true"
      dashboard.name: "Prowlarr"
      dashboard.port: "9696"
      dashboard.color: "#7b5ea7"
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-501}
      - PGID=${PGID:-20}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/sonarr:/config
      - ./data:/data
    ports:
      - "8989:8989"
    labels:
      dashboard.enabled: "true"
      dashboard.name: "Sonarr"
      dashboard.port: "8989"
      dashboard.color: "#35c5f4"
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-501}
      - PGID=${PGID:-20}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/radarr:/config
      - ./data:/data
    ports:
      - "7878:7878"
    labels:
      dashboard.enabled: "true"
      dashboard.name: "Radarr"
      dashboard.port: "7878"
      dashboard.color: "#ffc230"
    restart: unless-stopped

  dashboard:
    image: python:3-alpine
    container_name: dashboard
    command: python /app/server.py
    volumes:
      - ./dashboard:/app:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "80:80"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    labels:
      dashboard.enabled: "true"
      dashboard.name: "FlareSolverr"
      dashboard.port: "8191"
      dashboard.color: "#444"
    restart: unless-stopped
