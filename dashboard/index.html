<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #e2e2e2;
    }
    p.subtitle {
      color: #888;
      margin-bottom: 2.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      max-width: 800px;
      width: 100%;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    a.card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    a.card .name {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    a.card .port {
      font-size: 0.85rem;
      opacity: 0.7;
    }
    a.card .badge {
      font-size: 0.7rem;
      margin-top: 0.5rem;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      background: rgba(0,0,0,0.25);
      display: none;
    }
    a.card.unavailable {
      opacity: 0.35;
      pointer-events: none;
      cursor: default;
    }
    a.card.unavailable .badge {
      display: inline-block;
    }
    a.card.unavailable:hover {
      transform: none;
      box-shadow: none;
    }
    .notice {
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.85rem;
      color: #999;
      max-width: 800px;
      text-align: center;
      display: none;
    }
    .notice a { color: #7ecbff; }
    .loading {
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Media Server</h1>
  <p class="subtitle">macbook-joe</p>
  <div class="grid" id="grid">
    <span class="loading">Loading services...</span>
  </div>
  <div class="notice" id="remote-notice">
    Some services are only available on the local network.
    Install <a href="https://tailscale.com/" target="_blank">Tailscale</a>
    on this server and your devices for secure remote access to everything.
  </div>
  <script>
    function isLocal() {
      var h = location.hostname;
      if (h === 'localhost' || h === '127.0.0.1' || h === '::1') return true;
      if (h.endsWith('.local')) return true;
      if (/^10\./.test(h)) return true;
      if (/^192\.168\./.test(h)) return true;
      if (/^172\.(1[6-9]|2\d|3[01])\./.test(h)) return true;
      if (h.indexOf('.') === -1) return true;
      if (h.endsWith('.ts.net')) return true;
      if (/^100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\./.test(h)) return true;  // Tailscale CGNAT
      return false;
    }

    var local = isLocal();
    var grid = document.getElementById('grid');

    fetch('/api/services')
      .then(function(r) { return r.json(); })
      .then(function(services) {
        grid.innerHTML = '';
        if (services.length === 0) {
          grid.innerHTML = '<span class="loading">No services running</span>';
          return;
        }
        var hasUnavailable = false;
        services.forEach(function(s) {
          var a = document.createElement('a');
          a.className = 'card';
          a.style.background = s.color;
          if (['#ffc230', '#e5a00d'].indexOf(s.color) !== -1) {
            a.style.color = '#1a1a2e';
          }
          a.href = location.protocol + '//' + location.hostname + ':' + s.port + (s.path || '');

          if (!local && !s.external) {
            a.classList.add('unavailable');
            hasUnavailable = true;
          }

          a.innerHTML =
            '<span class="name">' + s.name + '</span>' +
            '<span class="port">:' + s.port + '</span>' +
            '<span class="badge">local only</span>';

          grid.appendChild(a);
        });
        if (hasUnavailable) {
          document.getElementById('remote-notice').style.display = 'block';
        }
      })
      .catch(function() {
        grid.innerHTML = '<span class="loading">Could not load services</span>';
      });
  </script>
</body>
</html>
