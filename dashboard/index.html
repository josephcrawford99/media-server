<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>media-server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace;
      background: #000;
      color: #0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-size: 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 24px;
      font-weight: normal;
      margin-bottom: 0.25rem;
    }
    p.subtitle {
      color: #0a0;
      margin-bottom: 2rem;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      max-width: 800px;
      width: 100%;
    }
    a.card {
      display: block;
      padding: 1rem 1.25rem;
      border: 1px solid #0a0;
      text-decoration: none;
      color: #0f0;
      transition: border-color 0.15s, background 0.15s;
    }
    a.card:hover {
      border-color: #0f0;
      background: rgba(0, 255, 0, 0.05);
    }
    a.card .name {
      font-size: 16px;
      display: block;
      margin-bottom: 0.25rem;
    }
    a.card .name::before {
      content: '> ';
      color: #0a0;
    }
    a.card .port {
      font-size: 13px;
      color: #0a0;
      display: block;
    }
    a.card .badge {
      font-size: 12px;
      margin-top: 0.35rem;
      color: #060;
      display: none;
    }
    a.card.unavailable {
      opacity: 0.3;
      pointer-events: none;
      border-color: #030;
    }
    a.card.unavailable .badge {
      display: block;
    }
    a.card.unavailable:hover {
      background: none;
    }
    .notice {
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      border: 1px solid #030;
      font-size: 13px;
      color: #0a0;
      max-width: 800px;
      text-align: center;
      display: none;
    }
    .notice a { color: #0f0; }
    .loading { color: #0a0; }
    .status {
      margin-top: 1.5rem;
      font-size: 13px;
      color: #0a0;
      max-width: 800px;
      width: 100%;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>media-server</h1>
  <p class="subtitle">macbook-joe</p>
  <div class="grid" id="grid">
    <span class="loading">loading...</span>
  </div>
  <div class="notice" id="remote-notice">
    some services are local only.
    <a href="https://tailscale.com/" target="_blank">tailscale</a>
    for remote access.
  </div>
  <div class="status" id="status"></div>
  <script>
    function isLocal() {
      var h = location.hostname;
      if (h === 'localhost' || h === '127.0.0.1' || h === '::1') return true;
      if (h.endsWith('.local')) return true;
      if (/^10\./.test(h)) return true;
      if (/^192\.168\./.test(h)) return true;
      if (/^172\.(1[6-9]|2\d|3[01])\./.test(h)) return true;
      if (h.indexOf('.') === -1) return true;
      if (h.endsWith('.ts.net')) return true;
      if (/^100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\./.test(h)) return true;
      return false;
    }

    var local = isLocal();
    var grid = document.getElementById('grid');
    var status = document.getElementById('status');

    fetch('/api/services')
      .then(function(r) { return r.json(); })
      .then(function(services) {
        grid.innerHTML = '';
        if (services.length === 0) {
          grid.innerHTML = '<span class="loading">no services running</span>';
          return;
        }
        var running = 0;
        var hasUnavailable = false;
        services.forEach(function(s) {
          var a = document.createElement('a');
          a.className = 'card';
          a.href = location.protocol + '//' + location.hostname + ':' + s.port + (s.path || '');

          if (!local && !s.external) {
            a.classList.add('unavailable');
            hasUnavailable = true;
          }

          if (s.status === 'running') running++;

          a.innerHTML =
            '<span class="name">' + s.name + '</span>' +
            '<span class="port">:' + s.port + '</span>' +
            '<span class="badge">[local only]</span>';

          grid.appendChild(a);
        });
        status.textContent = running + '/' + services.length + ' services running';
        if (hasUnavailable) {
          document.getElementById('remote-notice').style.display = 'block';
        }
      })
      .catch(function() {
        grid.innerHTML = '<span class="loading">could not load services</span>';
      });
  </script>
</body>
</html>
