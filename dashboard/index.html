<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #e2e2e2;
    }
    p.subtitle {
      color: #888;
      margin-bottom: 2.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      max-width: 800px;
      width: 100%;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a.card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    a.card .name {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    a.card .port {
      font-size: 0.85rem;
      opacity: 0.7;
    }
    .plex       { background: #e5a00d; }
    .sonarr     { background: #35c5f4; }
    .radarr     { background: #ffc230; color: #1a1a2e; }
    .prowlarr   { background: #7b5ea7; }
    .transmission { background: #b71c1c; }
    .flaresolverr { background: #444; }
  </style>
</head>
<body>
  <h1>Media Server</h1>
  <p class="subtitle">macbook-old</p>
  <div class="grid">
    <a class="card plex" href="//:32400/web">
      <span class="name">Plex</span>
      <span class="port">:32400</span>
    </a>
    <a class="card sonarr" href="//:8989">
      <span class="name">Sonarr</span>
      <span class="port">:8989</span>
    </a>
    <a class="card radarr" href="//:7878">
      <span class="name">Radarr</span>
      <span class="port">:7878</span>
    </a>
    <a class="card prowlarr" href="//:9696">
      <span class="name">Prowlarr</span>
      <span class="port">:9696</span>
    </a>
    <a class="card transmission" href="//:9091">
      <span class="name">Transmission</span>
      <span class="port">:9091</span>
    </a>
    <a class="card flaresolverr" href="//:8191">
      <span class="name">FlareSolverr</span>
      <span class="port">:8191</span>
    </a>
  </div>
  <script>
    // Resolve links relative to current hostname so they work regardless of
    // whether you access via IP, macbook-old, or macbook-old.local
    document.querySelectorAll('a.card').forEach(a => {
      a.href = location.protocol + '//' + location.hostname + a.getAttribute('href').replace('//', '');
    });
  </script>
</body>
</html>
